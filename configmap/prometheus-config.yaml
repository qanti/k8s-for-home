apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: 'node-exporter'
        static_configs:
          - targets:
              - 10.244.1.2:9100
              - 10.244.2.2:9100
